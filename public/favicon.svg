<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Abacaxi (Pineapple) -->
  <!-- Corpo do abacaxi - amarelo -->
  <ellipse cx="100" cy="110" rx="50" ry="55" fill="#FFD700"/>
  
  <!-- Pattern de losangos no abacaxi -->
  <g stroke="#F0B000" stroke-width="1" fill="none">
    <line x1="70" y1="65" x2="130" y2="155"/>
    <line x1="75" y1="60" x2="135" y2="150"/>
    <line x1="80" y1="60" x2="140" y2="150"/>
    <line x1="65" y1="75" x2="135" y2="145"/>
    <line x1="60" y1="85" x2="130" y2="155"/>
    <line x1="60" y1="95" x2="140" y2="155"/>
    
    <line x1="130" y1="65" x2="70" y2="155"/>
    <line x1="125" y1="60" x2="65" y2="150"/>
    <line x1="120" y1="60" x2="60" y2="150"/>
    <line x1="135" y1="75" x2="65" y2="145"/>
    <line x1="140" y1="85" x2="70" y2="155"/>
    <line x1="140" y1="95" x2="60" y2="155"/>
  </g>
  
  <!-- Folhas na coroa - verde -->
  <g fill="#228B22">
    <!-- Folha 1 (centro-cima) -->
    <path d="M 100 50 Q 95 35 100 20 Q 105 35 100 50 Z" fill="#2d8f2d"/>
    
    <!-- Folha 2 (esquerda) -->
    <path d="M 80 55 Q 65 48 55 45 Q 70 55 80 62 Z" fill="#228B22"/>
    
    <!-- Folha 3 (direita) -->
    <path d="M 120 55 Q 135 48 145 45 Q 130 55 120 62 Z" fill="#2d8f2d"/>
    
    <!-- Folha 4 (cima-esquerda) -->
    <path d="M 85 40 Q 72 28 68 15 Q 80 32 90 45 Z" fill="#2d8f2d"/>
    
    <!-- Folha 5 (cima-direita) -->
    <path d="M 115 40 Q 128 28 132 15 Q 120 32 110 45 Z" fill="#228B22"/>
  </g>
  
  <!-- Sombra para profundidade -->
  <ellipse cx="100" cy="165" rx="48" ry="12" fill="rgba(0,0,0,0.1)"/>
</svg>